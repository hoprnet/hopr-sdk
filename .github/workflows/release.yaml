name: Close release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: 'patch'

concurrency:
  group: release
  cancel-in-progress: false

