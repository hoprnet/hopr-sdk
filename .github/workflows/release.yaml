name: Close release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: 'patch'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yaml
  publish:
    name: Publish
    needs:
      - build
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/publish.yaml
    with:
      version_type: release
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
  release:
    name: Close release
    needs:
      - build
      - publish
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    outputs:
      released_version: ${{ steps.release.outputs.current_version }}
    steps:
      - name: Release version
        id: release
        uses: hoprnet/hopr-workflows/actions/release-version@fd29bf3c58b72faacc300e068a05b59eb3b180bc # 0.9.4
        with:
          source_branch: ${{ github.ref_name }}
          file: package.json
          release_type: ${{ inputs.release_type }}
          cachix_cache_name: hopr-sdk
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
          zulip_email: ${{ secrets.ZULIP_EMAIL }}
          zulip_channel: Products
          zulip_topic: Releases
          github_app_private_key: ${{ secrets.GH_APP_HOPRNET_BOT_PRIVATE_KEY }}
