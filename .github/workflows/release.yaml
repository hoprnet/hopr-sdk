name: Close release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: 'patch'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yaml
    with:
      node_version: '22'
  release:
    name: Close release
    needs:
      - build
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: write
    outputs:
      released_version: ${{ steps.release.outputs.current_version }}
    steps:
      - name: Release version
        id: release
        uses: hoprnet/hopr-workflows/actions/release-version@release-version-v3
        with:
          source_branch: ${{ github.ref_name }}
          file: package.json
          release_type: ${{ inputs.release_type }}
          cachix_cache_name: hopr-sdk
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
          zulip_email: ${{ secrets.ZULIP_EMAIL }}
          zulip_channel: Products
          zulip_topic: Releases
          gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
          github_token: ${{ secrets.GH_RUNNER_TOKEN }}
  publish:
    name: Publish
    needs:
      - build
      - release
    uses: ./.github/workflows/publish.yaml
    with:
      version_type: release
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
